<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gathering Roulette</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Kode+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <header class="header">
      <h1>Gathering roulette</h1>
    </header>

    <!-- Wheel -->
    <div class="wheel-center">
      <div class="wheel-wrapper">
        <div class="wheel-pointer"></div>
        <div class="wheel-outer">
          <canvas id="wheel-canvas" width="400" height="400"></canvas>
        </div>
      </div>
    </div>

    <!-- Spin button (own element for mobile flow) -->
    <div class="spin-area">
      <button id="spin-btn" class="neu-btn spin-btn">Spin</button>
    </div>

    <!-- Spin info -->
    <div class="spin-info" id="spin-info"></div>

    <!-- Queue panel -->
    <div class="queue-panel">
      <div class="queue-header">
        <span class="queue-label">Presentation Queue</span>
        <span class="queue-time" id="queue-time">0 / 90 min</span>
      </div>
      <ul id="presenter-list" class="presenter-list"></ul>
    </div>

    <!-- Action bar: Start + Reset -->
    <div class="action-bar">
      <button id="start-btn" class="neu-btn bottom-btn start-btn" disabled>Start</button>
      <button id="reset-btn" class="neu-btn bottom-btn reset-btn">Reset</button>
    </div>

    <!-- Presentation Overlay -->
    <div id="presentation-overlay" class="presentation-overlay hidden">
      <div class="pres-layout">
        <!-- Center content -->
        <div class="pres-center">
          <div class="pres-card" id="pres-card">
            <div class="pres-name" id="current-presenter-name">&mdash;</div>
            <div class="pres-clock" id="timer-text">5:00</div>
            <div class="pres-progress-track">
              <div class="pres-progress-bar" id="timer-progress-bar"></div>
            </div>
            <div class="pres-status" id="timer-status"></div>
            <div class="pres-up-next" id="up-next"></div>
            <video id="times-up-video" class="times-up-video hidden" src="stop-ascii.mp4" muted loop playsinline></video>
          </div>
        </div>

        <!-- Bottom controls -->
        <div class="pres-bottom">
          <div class="pres-controls">
            <button id="skip-btn" class="neu-btn pres-ctrl-btn">Skip</button>
            <button id="pause-btn" class="neu-btn pres-ctrl-btn">Pause</button>
            <button id="next-btn" class="neu-btn pres-ctrl-btn next-btn hidden">Next</button>
            <button id="stop-btn" class="neu-btn pres-ctrl-btn stop-btn">Stop All</button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script type="module">
    import { WebHaptics } from 'https://esm.sh/web-haptics';
    window.__haptics = new WebHaptics();
  </script>
  <script src="app.js" defer></script>
</body>
</html>
